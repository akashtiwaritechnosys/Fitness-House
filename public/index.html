<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Habit Tracker V5</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#667eea">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #2d3748;
            --text-muted: #718096;
            --primary: #667eea;
            --primary-hover: #5a67d8;
            --danger: #fc8181;
            --danger-hover: #f56565;
            --border-color: #e2e8f0;
            --success: #48bb78;
        }

        body.dark-mode {
            --bg-gradient: linear-gradient(135deg, #1a202c 0%, #2d3748 100%);
            --card-bg: rgba(26, 32, 44, 0.95);
            --text-main: #f7fafc;
            --text-muted: #a0aec0;
            --border-color: #4a5568;
            --primary: #818cf8;
            --primary-hover: #6366f1;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background: var(--bg-gradient); min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            padding: 2rem; color: var(--text-main); transition: background 0.3s ease;
        }

        /* --- Auth Modal --- */
        .auth-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center;
            z-index: 1000; backdrop-filter: blur(5px);
        }

        .auth-card {
            background: var(--card-bg); padding: 3rem; border-radius: 20px;
            width: 100%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); text-align: center;
        }
        
        .auth-card h2 { margin-bottom: 1.5rem; color: var(--text-main); }
        .auth-card input, .auth-card select, .auth-card textarea {
            width: 100%; margin-bottom: 1rem; padding: 1rem;
            border: 2px solid var(--border-color); border-radius: 12px; font-size: 1rem;
            background: transparent; color: var(--text-main);
        }
        .auth-card button { width: 100%; padding: 1rem; justify-content: center; margin-top: 0.5rem; }
        .auth-card p { margin-top: 1.5rem; color: var(--text-muted); cursor: pointer; font-size: 0.9rem; }
        .auth-card p span { color: var(--primary); font-weight: 600; }

        /* --- Main App UI --- */
        .container {
            background: var(--card-bg); border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            width: 100%; max-width: 1200px; padding: 2.5rem; backdrop-filter: blur(10px);
            display: none; transition: background 0.3s ease;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        h1 { font-size: 2.2rem; font-weight: 800; background: -webkit-linear-gradient(45deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px; }

        .add-form { display: flex; gap: 1rem; flex-wrap: wrap; }
        input[type="text"], input[type="number"], select {
            padding: 0.75rem 1.2rem; border: 2px solid var(--border-color); border-radius: 12px;
            font-size: 1rem; outline: none; transition: all 0.3s; background: transparent; color: var(--text-main);
        }
        input[type="text"]:focus, input[type="number"]:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15); }

        button {
            padding: 0.75rem 1.5rem; border: none; border-radius: 12px; background: var(--primary);
            color: white; font-weight: 600; font-size: 1rem; cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; gap: 0.5rem;
        }
        button:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 6px 15px rgba(102, 126, 234, 0.3); }

        .table-container { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border-color); }
        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: center; padding: 1.2rem 1rem; color: var(--text-muted); font-weight: 600;
            font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.08em;
            border-bottom: 2px solid var(--border-color); background: rgba(0,0,0,0.02);
        }
        th:first-child { text-align: left; padding-left: 1.5rem; }
        tbody tr { border-bottom: 1px solid var(--border-color); transition: background 0.2s; }
        tbody tr.dragging { opacity: 0.5; background: rgba(102, 126, 234, 0.1) !important; }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: rgba(0,0,0,0.03); }
        body.dark-mode tbody tr:hover { background: rgba(255,255,255,0.05); }

        td { padding: 1.2rem 1rem; vertical-align: middle; text-align: center; }
        td:first-child { text-align: left; padding-left: 1.5rem; font-weight: 500; color: var(--text-main); }

        .editable { cursor: pointer; padding: 0.4rem 0.6rem; border-radius: 8px; border: 1px dashed transparent; transition: all 0.2s; display: inline-block; min-width: 50px; word-break: break-word; }
        .editable:hover { background: rgba(0,0,0,0.05); border-color: var(--border-color); }
        body.dark-mode .editable:hover { background: rgba(255,255,255,0.1); }
        .editable:focus { background: transparent; border-color: var(--primary); border-style: solid; outline: none; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }

        .goal-cell { font-weight: 600; color: var(--primary); background: rgba(102, 126, 234, 0.1); border-radius: 8px; padding: 0.4rem 0.8rem; display: inline-block; }

        /* Checkbox */
        .checkbox-wrapper { display: inline-block; position: relative; }
        .checkbox-wrapper input[type="checkbox"] { display: none; }
        .checkbox-wrapper label {
            display: block; width: 26px; height: 26px; border: 2px solid var(--border-color); border-radius: 8px; cursor: pointer;
            position: relative; transition: all 0.3s; margin: 0 auto; background: transparent;
        }
        .checkbox-wrapper input[type="checkbox"]:checked + label {
            background-color: var(--success); border-color: var(--success); transform: scale(1.05); box-shadow: 0 4px 10px rgba(72, 187, 120, 0.3);
        }
        .checkbox-wrapper input[type="checkbox"]:checked + label::after {
            content: ''; position: absolute; left: 8px; top: 4px; width: 6px; height: 12px;
            border: solid white; border-width: 0 2px 2px 0; transform: rotate(45deg);
        }

        .actions { display: flex; gap: 0.5rem; justify-content: center; }
        .btn-icon { background: transparent; color: var(--text-muted); padding: 0.5rem; border-radius: 8px; font-size: 1.2rem; box-shadow: none; cursor: grab; }
        .btn-icon:active { cursor: grabbing; }
        .btn-icon:hover { background: rgba(0, 0, 0, 0.05); transform: scale(1.1); }
        .btn-delete:hover { background: rgba(252, 129, 129, 0.1); color: var(--danger); }
        
        .empty-state { text-align: center; padding: 4rem; color: var(--text-muted); }
        
        .controls {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;
            background: rgba(0,0,0,0.02); padding: 1rem 1.5rem; border-radius: 12px; border: 1px solid var(--border-color);
        }
        body.dark-mode .controls { background: rgba(0,0,0,0.2); }
        
        .week-nav { display: flex; gap: 1rem; align-items: center; font-weight: 600; }
        .week-nav button { background: transparent; color: var(--text-main); padding: 0.5rem 1rem; border: 1px solid var(--border-color); font-size: 0.9rem; }
        .week-nav button:hover { background: rgba(0,0,0,0.05); transform: translateY(0); }
        body.dark-mode .week-nav button:hover { background: rgba(255,255,255,0.1); }

        .secondary-btn { background: transparent; color: var(--text-main); border: 1px solid var(--border-color); font-size: 0.9rem; }
        .secondary-btn:hover { background: rgba(0, 0, 0, 0.05); border-color: var(--border-color); color: var(--text-main); }
        body.dark-mode .secondary-btn:hover { background: rgba(255, 255, 255, 0.1); }
        
        .danger-btn { color: var(--danger); border-color: var(--danger); }
        .danger-btn:hover { background: rgba(252, 129, 129, 0.1); border-color: var(--danger-hover); color: var(--danger-hover); }

        .user-info { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; justify-content: center; }
        .user-badge { background: var(--primary); color: white; padding: 0.5rem 1rem; border-radius: 20px; font-weight: 600; font-size: 0.9rem; max-width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center; }

        /* V4/V5 Features CSS */
        .goal-input { width: 100px; }
        .progress-container { width: 100%; height: 12px; background: rgba(0,0,0,0.05); border-radius: 6px; margin-bottom: 1.5rem; overflow: hidden; position: relative; border: 1px solid var(--border-color); }
        body.dark-mode .progress-container { background: rgba(0,0,0,0.3); }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--primary), #a78bfa); width: 0%; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 6px; }
        .streak-badge { font-size: 0.8rem; color: #ed8936; margin-left: 0.5rem; font-weight: bold; padding: 2px 6px; background: rgba(237, 137, 54, 0.15); border-radius: 10px;}
        .mood-cell { cursor: pointer; font-size: 1.5rem; transition: transform 0.2s; user-select: none; }
        .mood-cell:hover { transform: scale(1.2); }
        .note-indicator { position:absolute; top:4px; right:6px; font-size:0.8rem; cursor:pointer; transition: transform 0.2s; }
        .note-indicator:hover { transform: scale(1.2); }
        .timer-indicator { position:absolute; top:4px; left:4px; font-size:0.8rem; cursor:pointer; transition: transform 0.2s; }
        .timer-indicator:hover { transform: scale(1.2); }

        .level-badge { background: linear-gradient(135deg, #f6ad55, #ed8936); color: white; padding: 0.5rem 1rem; border-radius: 20px; font-weight: bold; font-size: 0.9rem; cursor: help; }
        .filter-chip { background: transparent; color: var(--text-main); padding: 0.4rem 1rem; border-radius: 20px; border: 1px solid var(--border-color); cursor: pointer; transition: all 0.2s; font-size: 0.85rem; font-weight: 600; white-space: nowrap; }
        .filter-chip:hover { background: rgba(0,0,0,0.05); }
        body.dark-mode .filter-chip:hover { background: rgba(255,255,255,0.1); }
        .filter-chip.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 10px rgba(102, 126, 234, 0.3); }

        /* --- Responsive Design --- */
        @media (max-width: 768px) {
            body { padding: 1rem; display: block; }
            .auth-overlay { align-items: flex-start; padding-top: 2rem; }
            .container { padding: 1rem; border-radius: 15px; margin: 0 auto; width: 100%; max-width: 100%; }
            .table-container { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
            h1 { font-size: 1.8rem; text-align: center; width: 100%; }
            .header { flex-direction: column; align-items: stretch; gap: 1rem; margin-bottom: 1.5rem; }
            .add-form { flex-direction: column; width: 100%; }
            .add-form input[type="text"], .add-form input[type="number"], .add-form select { width: 100%; font-size: 16px; }
            .add-form button { width: 100%; justify-content: center; }
            .controls { flex-direction: column; gap: 1rem; padding: 1rem; }
            .week-nav { width: 100%; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
            .week-nav button { flex: 1; min-width: 100px; text-align: center; justify-content: center; }
            #currentWeekLabel { min-width: 100%; flex: 100%; text-align: center; order: -1; margin-bottom: 0.5rem; }
            .user-info { width: 100%; justify-content: center; flex-direction: row; flex-wrap: wrap; gap: 0.8rem; }
            th, td { padding: 0.8rem 0.5rem; font-size: 0.9rem; }
            td:first-child, th:first-child { padding-left: 0.5rem; min-width: 120px; }
            .auth-card { padding: 1.5rem; margin: 0 auto; width: 92%; }
            .auth-card input, .auth-card select { font-size: 16px; }
            .action-btns { width: 100%; display: flex; flex-direction: column; gap: 0.8rem; }
            .action-btns button { width: 100%; }
        }
    </style>
</head>
<body>

    <!-- Timer Modal -->
    <div class="auth-overlay" id="timerModal" style="display: none; z-index: 3000;">
        <div class="auth-card" style="max-width: 100vw; height: 100vh; border-radius: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: var(--bg-gradient); border: none;">
            <h2 id="timerTitle" style="font-size: 2.5rem; margin-bottom: 2rem;">Focus Mode</h2>
            <div id="timerDisplay" style="font-size: 7rem; font-weight: 800; font-family: monospace; color: var(--primary); margin-bottom: 3rem; text-shadow: 0 10px 20px rgba(0,0,0,0.1);">25:00</div>
            <div style="display: flex; gap: 1rem;">
                <button onclick="startTimer()" id="btnStartTimer" style="font-size: 1.2rem; padding: 1rem 3rem; border-radius: 30px;">▶ Start</button>
                <button onclick="pauseTimer()" id="btnPauseTimer" class="secondary-btn" style="font-size: 1.2rem; padding: 1rem 3rem; display: none; border-radius: 30px;">⏸ Pause</button>
                <button onclick="closeTimer()" class="danger-btn secondary-btn" style="font-size: 1.2rem; padding: 1rem 3rem; border-radius: 30px;">Exit</button>
            </div>
        </div>
    </div>

    <!-- Note Modal -->
    <div class="auth-overlay" id="noteModal" style="display: none; z-index: 2500;">
        <div class="auth-card" style="max-width: 500px;">
            <h2 id="noteTitle">Daily Note</h2>
            <textarea id="noteText" rows="4" style="width: 100%; margin-bottom: 1.5rem; padding: 1rem; border-radius: 12px; border: 2px solid var(--border-color); background: transparent; color: var(--text-main); font-family: inherit; resize: vertical;" placeholder="How did it go today?"></textarea>
            <div style="display: flex; gap: 1rem;">
                <button onclick="saveNote()" style="flex: 1; justify-content: center;">Save Note</button>
                <button class="secondary-btn" onclick="document.getElementById('noteModal').style.display='none'" style="flex: 1; justify-content: center; margin-top: 0;">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Chart Modal -->
    <div class="auth-overlay" id="chartModal" style="display: none; z-index: 2000;">
        <div class="auth-card" style="max-width: 800px; width: 95%;">
            <h2>Your Progress</h2>
            <div style="display: flex; gap: 1rem; justify-content: center; margin-bottom: 1.5rem; flex-wrap: wrap;">
                <button onclick="renderChart('daily')" id="btnDaily" class="secondary-btn" style="background: var(--primary); color: white; width: auto; margin-top: 0;">Daily</button>
                <button onclick="renderChart('weekly')" id="btnWeekly" class="secondary-btn" style="width: auto; margin-top: 0;">Weekly</button>
                <button onclick="renderChart('monthly')" id="btnMonthly" class="secondary-btn" style="width: auto; margin-top: 0;">Monthly</button>
                <button onclick="renderChart('heatmap')" id="btnHeatmap" class="secondary-btn" style="width: auto; margin-top: 0;">🔥 Heatmap</button>
            </div>
            <div id="chartWrapper" style="position: relative; height: 300px; width: 100%;">
                <canvas id="progressChart"></canvas>
            </div>
            <div id="heatmapContainer" style="display: none; width: 100%; max-height: 300px; overflow-x: auto; padding-bottom: 1rem; text-align: left;">
                <!-- Heatmap squares -->
            </div>
            <button class="secondary-btn" onclick="document.getElementById('chartModal').style.display='none'" style="margin-top: 1.5rem; width: 100%;">Close</button>
        </div>
    </div>

    <!-- Archive Modal -->
    <div class="auth-overlay" id="archiveModal" style="display: none; z-index: 2000;">
        <div class="auth-card" style="max-width: 600px; width: 95%;">
            <h2>Archived Habits</h2>
            <div id="archiveList" style="text-align: left; max-height: 300px; overflow-y: auto; margin-bottom: 1.5rem; color: var(--text-main);"></div>
            <button class="secondary-btn" onclick="document.getElementById('archiveModal').style.display='none'" style="width: 100%;">Close</button>
        </div>
    </div>

    <!-- Leaderboard Modal -->
    <div class="auth-overlay" id="leaderboardModal" style="display: none; z-index: 2000;">
        <div class="auth-card" style="max-width: 600px; width: 95%;">
            <h2>🏆 Leaderboard</h2>
            <div id="leaderboardList" style="text-align: left; max-height: 400px; overflow-y: auto; margin-bottom: 1.5rem; color: var(--text-main);">Loading...</div>
            <button class="secondary-btn" onclick="document.getElementById('leaderboardModal').style.display='none'" style="width: 100%;">Close</button>
        </div>
    </div>

    <!-- Admin Modal -->
    <div class="auth-overlay" id="adminModal" style="display: none; z-index: 2000;">
        <div class="auth-card" style="max-width: 800px; width: 95%;">
            <h2>👑 Admin Dashboard</h2>
            <div id="adminList" style="text-align: left; max-height: 400px; overflow-y: auto; margin-bottom: 1.5rem; color: var(--text-main);">Loading...</div>
            <button class="secondary-btn" onclick="document.getElementById('adminModal').style.display='none'" style="width: 100%;">Close</button>
        </div>
    </div>

    <!-- Auth Modal -->
    <div class="auth-overlay" id="authOverlay">
        <div class="auth-card">
            <h2 id="authTitle">Welcome</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button id="authBtn" onclick="handleAuth()">Login</button>
            <p id="authSwitch" onclick="switchAuthMode()">Don't have an account? <span>Register</span></p>
        </div>
    </div>

    <!-- Main App -->
    <div class="container" id="appContainer">
        <div class="header">
            <h1>Habit Tracker</h1>
            <div class="add-form">
                <input type="text" id="habitName" placeholder="e.g., 💧 Drink 3L Water" required>
                <select id="habitCategory" title="Category">
                    <option value="Health">🔴 Health</option>
                    <option value="Work">🔵 Work</option>
                    <option value="Mindfulness">🟢 Mindfulness</option>
                    <option value="Personal">🟡 Personal</option>
                    <option value="General" selected>⚪ General</option>
                </select>
                <select id="habitFrequency" title="Frequency">
                    <option value="Everyday" selected>Everyday</option>
                    <option value="Weekdays">Weekdays</option>
                    <option value="Weekends">Weekends</option>
                </select>
                <input type="number" id="habitGoal" placeholder="Goal" value="30" min="1" class="goal-input">
                <button onclick="addHabit()">Add Habit</button>
            </div>
            <div class="user-info">
                <button class="secondary-btn" onclick="toggleDarkMode()" id="darkModeBtn" style="padding: 0.5rem; font-size: 1.2rem;" title="Toggle Dark Mode">🌙</button>
                <button class="secondary-btn" onclick="openAdmin()" id="adminBtn" style="display:none; padding: 0.5rem; border-color: var(--primary); color: var(--primary);" title="Admin Dashboard">👑 Admin</button>
                <span class="level-badge" id="levelDisplay" title="0/100 XP to next level">Level 1 🌟</span>
                <span class="user-badge" id="usernameDisplay">User</span>
                <button class="secondary-btn" onclick="logout()">Logout</button>
            </div>
        </div>
        
        <div style="display: flex; justify-content: space-between; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-muted); padding: 0 0.5rem;">
            <span>Today's Progress</span>
            <span id="progressText">0%</span>
        </div>
        <div class="progress-container" title="Today's Progress">
            <div class="progress-bar" id="dailyProgress"></div>
        </div>

        <div class="controls">
            <div class="week-nav">
                <button onclick="changeWeek(-1)">← Previous</button>
                <span id="currentWeekLabel" style="min-width: 180px; text-align: center;">Week of ...</span>
                <button onclick="changeWeek(1)">Next →</button>
            </div>
            <div class="action-btns" style="display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;">
                <button class="secondary-btn" onclick="openLeaderboard()" style="border-color: #ed8936; color: #ed8936;">🏆 Leaderboard</button>
                <button class="secondary-btn" onclick="openArchiveModal()" style="border-color: var(--text-muted); color: var(--text-muted);">📂 View Archive</button>
                <button class="secondary-btn" onclick="openChartModal()" style="border-color: var(--primary); color: var(--primary);">📈 View Progress</button>
                <button class="secondary-btn" onclick="exportCSV()" style="border-color: var(--success); color: var(--success);">📊 Export CSV</button>
            </div>
        </div>

        <div id="filterContainer" style="display: flex; gap: 0.5rem; margin-bottom: 1rem; overflow-x: auto; padding-bottom: 0.5rem; -webkit-overflow-scrolling: touch;">
            <!-- Filter chips -->
        </div>

        <div class="table-container">
            <table id="trackerTable">
                <thead>
                    <tr>
                        <th>Daily Habits</th>
                        <th>Goal</th>
                        <th id="day-0">Mon</th>
                        <th id="day-1">Tue</th>
                        <th id="day-2">Wed</th>
                        <th id="day-3">Thu</th>
                        <th id="day-4">Fri</th>
                        <th id="day-5">Sat</th>
                        <th id="day-6">Sun</th>
                        <th>Manage</th>
                    </tr>
                </thead>
                <tbody id="habitList">
                    <!-- Habits will be injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // --- Service Worker ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.error('SW reg failed', err));
            });
        }

        // --- State Management ---
        const API_URL = ''; 
        let token = localStorage.getItem('token');
        let currentUsername = localStorage.getItem('username');
        let userRole = localStorage.getItem('userRole') || 'user';
        let isLoginMode = true;
        
        let appData = { habits: [], moods: {}, xp: 0 };
        let habits = [];
        let moods = {};
        const MOOD_EMOJIS = ['➖', '😞', '😐', '🙂', '🤩'];
        const CAT_EMOJIS = { 'Health': '🔴', 'Work': '🔵', 'Mindfulness': '🟢', 'Personal': '🟡', 'General': '⚪' };
        let activeFilter = 'All';
        
        let currentDate = new Date();
        let day = currentDate.getDay();
        let diff = currentDate.getDate() - day + (day == 0 ? -6 : 1); 
        let weekStart = new Date(currentDate.setDate(diff));
        weekStart.setHours(0,0,0,0);

        // --- Init ---
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
            document.getElementById('darkModeBtn').textContent = '☀️';
        }

        if (token) {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('appContainer').style.display = 'block';
            document.getElementById('usernameDisplay').textContent = currentUsername;
            if (userRole === 'admin') document.getElementById('adminBtn').style.display = 'inline-block';
            fetchHabits();
        }

        // --- Auth Functions ---
        function switchAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('authTitle').innerText = isLoginMode ? 'Welcome Back' : 'Create Account';
            document.getElementById('authBtn').innerText = isLoginMode ? 'Login' : 'Register';
            document.getElementById('authSwitch').innerHTML = isLoginMode ? 
                `Don't have an account? <span>Register</span>` : 
                `Already have an account? <span>Login</span>`;
        }

        async function handleAuth() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if(!u || !p) return alert('Fill all fields');

            const endpoint = isLoginMode ? '/api/login' : '/api/register';
            
            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await res.json();
                
                if(!res.ok) throw new Error(data.error);

                if (isLoginMode) {
                    token = data.accessToken;
                    currentUsername = u;
                    userRole = data.role || 'user';
                    localStorage.setItem('token', token);
                    localStorage.setItem('username', u);
                    localStorage.setItem('userRole', userRole);
                    document.getElementById('authOverlay').style.display = 'none';
                    document.getElementById('appContainer').style.display = 'block';
                    document.getElementById('usernameDisplay').textContent = u;
                    if (userRole === 'admin') document.getElementById('adminBtn').style.display = 'inline-block';
                    fetchHabits();
                } else {
                    alert('Registration successful! Please login.');
                    switchAuthMode();
                }
            } catch(e) { alert(e.message); }
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            document.getElementById('darkModeBtn').textContent = isDark ? '☀️' : '🌙';
            localStorage.setItem('darkMode', isDark);
            if(chartInstance && document.getElementById('progressChart').style.display !== 'none') {
                renderChart(chartInstance.config.data.labels[0].includes('Week') ? 'weekly' : (chartInstance.config.data.labels[0].includes(' ') ? 'daily' : 'monthly'));
            } else if (document.getElementById('heatmapContainer').style.display === 'block') {
                renderChart('heatmap');
            }
        }

        // --- Data Functions ---
        async function fetchHabits() {
            try {
                const res = await fetch('/api/habits', { headers: { 'Authorization': `Bearer ${token}` } });
                if(res.status === 401 || res.status === 403) return logout();
                const data = await res.json();
                
                if (Array.isArray(data)) appData = { habits: data, moods: {}, xp: 0 };
                else if (data && data.habits) appData = data;
                
                habits = appData.habits || [];
                moods = appData.moods || {};
                
                if(habits.length === 0) {
                    habits = [
                        { id: 1, name: "⏰ Wake up at 6AM", goal: 30, category: "Personal", frequency: "Everyday", archived: false, completions: {}, notes: {} },
                        { id: 2, name: "💧 Drink 3L Water", goal: 30, category: "Health", frequency: "Everyday", archived: false, completions: {}, notes: {} }
                    ];
                    appData.habits = habits;
                    saveHabits();
                }
                renderFilters();
                render();
            } catch (e) { console.error('Failed to fetch', e); }
        }

        async function saveHabits() {
            try {
                let totalXp = 0;
                habits.forEach(h => {
                    Object.values(h.completions || {}).forEach(val => { if (val) totalXp += 10; });
                });
                appData.xp = totalXp;

                await fetch('/api/habits', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify(appData)
                });
            } catch (e) { console.error('Failed to save', e); }
        }

        function exportCSV() {
            if (habits.length === 0) return alert("No data to export.");
            let csv = "Habit Name,Category,Frequency,Archived,Date,Completed,Note\n";
            habits.forEach(habit => {
                let allDates = new Set();
                Object.keys(habit.completions || {}).forEach(d => allDates.add(d));
                Object.keys(habit.notes || {}).forEach(d => allDates.add(d));
                
                let sortedDates = Array.from(allDates).sort();
                sortedDates.forEach(dateStr => {
                    let completed = habit.completions[dateStr] ? "Yes" : "No";
                    let note = habit.notes && habit.notes[dateStr] ? habit.notes[dateStr].replace(/"/g, '""') : "";
                    csv += `"${habit.name}","${habit.category || 'General'}","${habit.frequency || 'Everyday'}","${habit.archived ? 'Yes' : 'No'}","${dateStr}","${completed}","${note}"\n`;
                });
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", `Habits_Export_${formatDate(new Date())}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // --- App Logic ---
        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${d}`;
        }

        function changeWeek(offset) {
            weekStart.setDate(weekStart.getDate() + (offset * 7));
            render();
        }

        function addHabit() {
            const nameInput = document.getElementById('habitName');
            const goalInput = document.getElementById('habitGoal');
            const catInput = document.getElementById('habitCategory');
            const freqInput = document.getElementById('habitFrequency');
            const name = nameInput.value.trim();
            const goal = parseInt(goalInput.value) || 30;
            const category = catInput.value || 'General';
            const frequency = freqInput.value || 'Everyday';

            if (name) {
                habits.push({ id: Date.now(), name, goal, category, frequency, archived: false, completions: {}, notes: {} });
                saveHabits();
                nameInput.value = '';
                render();
            }
        }

        function archiveHabit(id) {
            const habit = habits.find(h => h.id === id);
            if (habit) { habit.archived = true; saveHabits(); render(); }
        }
        
        function unarchiveHabit(id) {
            const habit = habits.find(h => h.id === id);
            if (habit) { habit.archived = false; saveHabits(); render(); openArchiveModal(); }
        }

        function deleteHabit(id, isArchivedList = false) {
            if (confirm("Permanently delete this habit? All history will be lost.")) {
                habits = habits.filter(h => h.id !== id);
                appData.habits = habits;
                saveHabits();
                render();
                if(isArchivedList) openArchiveModal();
            }
        }

        function toggleHabit(habitId, dateStr) {
            const habit = habits.find(h => h.id === habitId);
            if (habit) {
                if (habit.completions[dateStr]) delete habit.completions[dateStr];
                else habit.completions[dateStr] = true;
                saveHabits();
                render();
            }
        }

        function openArchiveModal() {
            const container = document.getElementById('archiveList');
            const archived = habits.filter(h => h.archived);
            if (archived.length === 0) {
                container.innerHTML = `<p style="text-align:center; padding: 2rem;">No archived habits.</p>`;
            } else {
                let html = '';
                archived.forEach(h => {
                    const emoji = CAT_EMOJIS[h.category || 'General'];
                    html += `
                        <div style="display:flex; justify-content:space-between; align-items:center; padding:1rem; border-bottom:1px solid var(--border-color);">
                            <span style="font-weight:500;">${emoji} ${h.name}</span>
                            <div style="display:flex; gap:0.5rem;">
                                <button class="secondary-btn" onclick="unarchiveHabit(${h.id})" style="padding:0.4rem 0.8rem; margin:0;">Restore</button>
                                <button class="secondary-btn danger-btn" onclick="deleteHabit(${h.id}, true)" style="padding:0.4rem 0.8rem; margin:0;">Delete</button>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            }
            document.getElementById('archiveModal').style.display = 'flex';
        }

        let activeNoteHabitId = null;
        let activeNoteDate = null;
        function openNoteModal(habitId, dateStr) {
            const habit = habits.find(h => h.id === habitId);
            if (!habit) return;
            if (!habit.notes) habit.notes = {};
            activeNoteHabitId = habitId;
            activeNoteDate = dateStr;
            document.getElementById('noteTitle').textContent = `Note: ${habit.name}`;
            document.getElementById('noteText').value = habit.notes[dateStr] || '';
            document.getElementById('noteModal').style.display = 'flex';
            setTimeout(() => document.getElementById('noteText').focus(), 100);
        }

        function saveNote() {
            const habit = habits.find(h => h.id === activeNoteHabitId);
            if (!habit) return;
            if (!habit.notes) habit.notes = {};
            const text = document.getElementById('noteText').value.trim();
            if (text) habit.notes[activeNoteDate] = text;
            else delete habit.notes[activeNoteDate];
            saveHabits();
            render();
            document.getElementById('noteModal').style.display = 'none';
        }

        function toggleMood(dateStr) {
            let current = moods[dateStr] || 0;
            moods[dateStr] = (current + 1) % MOOD_EMOJIS.length;
            saveHabits();
            render();
        }
        
        function updateHabitName(id, newName) {
            const habit = habits.find(h => h.id === id);
            if (habit && newName.trim() !== '') { habit.name = newName.trim(); saveHabits(); } 
            else if (habit) render(); 
        }
        
        function updateHabitGoal(id, newGoalStr) {
            const habit = habits.find(h => h.id === id);
            const newGoal = parseInt(newGoalStr);
            if (habit && !isNaN(newGoal) && newGoal > 0) { habit.goal = newGoal; saveHabits(); } 
            else if (habit) render();
        }

        function resetData() {
            if (confirm("Are you sure? This will delete all your personal habit data from the database.")) {
                appData = { habits: [], moods: {}, xp: 0 };
                habits = appData.habits;
                moods = appData.moods;
                saveHabits();
                renderFilters();
                render();
            }
        }

        // --- Drag and Drop ---
        let draggedHabitId = null;
        function dragStart(e, id) {
            draggedHabitId = id;
            e.target.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', id); 
            setTimeout(() => e.target.classList.remove('dragging'), 0);
        }
        function dragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            const tbody = document.getElementById('habitList');
            const afterElement = getDragAfterElement(tbody, e.clientY);
            const draggable = document.querySelector('.dragging');
            if (draggable) {
                if (afterElement == null) tbody.appendChild(draggable);
                else tbody.insertBefore(draggable, afterElement);
            }
        }
        function dragEnd(e) { e.target.classList.remove('dragging'); }
        function drop(e, targetId) {
            e.preventDefault();
            if (draggedHabitId === null || draggedHabitId === targetId) return;
            const draggedIndex = habits.findIndex(h => h.id === draggedHabitId);
            const targetIndex = habits.findIndex(h => h.id === targetId);
            if (draggedIndex > -1 && targetIndex > -1) {
                const draggedHabit = habits[draggedIndex];
                habits.splice(draggedIndex, 1);
                habits.splice(targetIndex, 0, draggedHabit);
                saveHabits();
                render();
            }
            draggedHabitId = null;
        }
        
        function getDragAfterElement(container, y) {
            const draggableElements = [...container.querySelectorAll('tr[draggable="true"]:not(.dragging)')];
            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                if (offset < 0 && offset > closest.offset) return { offset: offset, element: child };
                else return closest;
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        // --- Filters & Gamification ---
        function setFilter(cat) {
            activeFilter = cat;
            renderFilters();
            render();
        }

        function renderFilters() {
            const container = document.getElementById('filterContainer');
            let html = `<button class="filter-chip ${activeFilter==='All'?'active':''}" onclick="setFilter('All')">All</button>`;
            Object.keys(CAT_EMOJIS).forEach(cat => {
                html += `<button class="filter-chip ${activeFilter===cat?'active':''}" onclick="setFilter('${cat}')">${CAT_EMOJIS[cat]} ${cat}</button>`;
            });
            container.innerHTML = html;
        }

        function updateXP() {
            let xp = 0;
            habits.forEach(h => { Object.values(h.completions || {}).forEach(val => { if (val) xp += 10; }); });
            const level = Math.floor(xp / 100) + 1;
            const currentLevelXP = xp % 100;
            const levelDisplay = document.getElementById('levelDisplay');
            if (levelDisplay) {
                levelDisplay.textContent = `Level ${level} 🌟`;
                levelDisplay.title = `${currentLevelXP}/100 XP to Level ${level + 1}`;
            }
        }

        function getStreak(habit) {
            let streak = 0;
            let checkDate = new Date();
            let todayStr = formatDate(checkDate);
            let yesterday = new Date(checkDate);
            yesterday.setDate(yesterday.getDate() - 1);
            let yesterdayStr = formatDate(yesterday);
            
            if (!habit.completions[todayStr] && !habit.completions[yesterdayStr]) return 0;
            if (!habit.completions[todayStr] && habit.completions[yesterdayStr]) checkDate.setDate(checkDate.getDate() - 1);
            
            while(true) {
                if (habit.completions[formatDate(checkDate)]) {
                    streak++;
                    checkDate.setDate(checkDate.getDate() - 1);
                } else break;
            }
            return streak;
        }

        function updateProgress(activeHabits) {
            if (activeHabits.length === 0) {
                const bar = document.getElementById('dailyProgress');
                if(bar) bar.style.width = '0%';
                return;
            }
            const todayStr = formatDate(new Date());
            const dayNum = new Date().getDay();
            let totalExpected = 0;
            let completed = 0;
            activeHabits.forEach(h => {
                let shouldShow = true;
                const freq = h.frequency || 'Everyday';
                if (freq === 'Weekdays' && (dayNum === 0 || dayNum === 6)) shouldShow = false;
                if (freq === 'Weekends' && (dayNum !== 0 && dayNum !== 6)) shouldShow = false;
                if(shouldShow) {
                    totalExpected++;
                    if (h.completions[todayStr]) completed++;
                }
            });
            
            let percent = 0;
            if (totalExpected > 0) percent = (completed / totalExpected) * 100;
            
            const bar = document.getElementById('dailyProgress');
            const text = document.getElementById('progressText');
            
            const oldWidth = bar.style.width;
            bar.style.width = percent + '%';
            if (text) text.textContent = Math.round(percent) + '%';
            
            if (percent === 100 && totalExpected > 0 && oldWidth !== '100%' && oldWidth !== '') {
                if (typeof confetti === 'function') confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, colors: ['#667eea', '#764ba2', '#48bb78', '#f56565', '#ed8936'], zIndex: 3000 });
            }
        }

        function render() {
            updateXP();
            const tbody = document.getElementById('habitList');
            tbody.innerHTML = '';
            
            const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            const weekEndDate = new Date(weekStart);
            weekEndDate.setDate(weekEndDate.getDate() + 6);
            document.getElementById('currentWeekLabel').textContent = `${monthNames[weekStart.getMonth()]} ${weekStart.getDate()} - ${monthNames[weekEndDate.getMonth()]} ${weekEndDate.getDate()}, ${weekStart.getFullYear()}`;

            let days = [];
            for (let i = 0; i < 7; i++) {
                let d = new Date(weekStart);
                d.setDate(d.getDate() + i);
                days.push(d);
                const dayNames = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
                document.getElementById(`day-${i}`).innerHTML = `${dayNames[i]}<br><small style="color:var(--primary);font-size:0.9em;font-weight:700;">${d.getDate()}</small>`;
            }

            const activeHabits = habits.filter(h => {
                if (h.archived) return false;
                if (activeFilter !== 'All' && (h.category || 'General') !== activeFilter) return false;
                return true;
            });

            updateProgress(activeHabits);

            if (activeHabits.length === 0) {
                tbody.innerHTML = `<tr><td colspan="10" class="empty-state">No habits match this view. Add a habit or change your filter!</td></tr>`;
                return;
            }

            // Mood Row
            const moodTr = document.createElement('tr');
            moodTr.style.background = 'rgba(0,0,0,0.02)';
            if (document.body.classList.contains('dark-mode')) moodTr.style.background = 'rgba(255,255,255,0.02)';
            
            let moodHtml = `<td colspan="2" style="text-align:right; font-weight:bold; color:var(--text-muted); font-size:0.8rem; padding-right:1.5rem;">DAILY MOOD</td>`;
            days.forEach(dayDate => {
                const dateStr = formatDate(dayDate);
                const moodIdx = moods[dateStr] || 0;
                moodHtml += `<td><div class="mood-cell" onclick="toggleMood('${dateStr}')" title="Click to change mood">${MOOD_EMOJIS[moodIdx]}</div></td>`;
            });
            moodHtml += `<td></td>`;
            moodTr.innerHTML = moodHtml;
            tbody.appendChild(moodTr);

            activeHabits.forEach(habit => {
                const tr = document.createElement('tr');
                tr.setAttribute('draggable', 'true');
                tr.addEventListener('dragstart', (e) => { tr.classList.add('dragging'); dragStart(e, habit.id); });
                tr.addEventListener('dragover', dragOver);
                tr.addEventListener('dragend', dragEnd);
                tr.addEventListener('drop', (e) => drop(e, habit.id));

                const streak = getStreak(habit);
                const streakHtml = streak > 0 ? `<span class="streak-badge" title="${streak} Day Streak!">🔥 ${streak}</span>` : '';
                const catEmoji = CAT_EMOJIS[habit.category || 'General'];
                
                let tdHtml = `
                    <td style="cursor: grab;" title="Drag to reorder">
                        <div style="display: flex; align-items: center; flex-wrap: wrap; gap: 0.5rem;">
                            <span style="font-size:0.9rem;">${catEmoji}</span>
                            <span class="editable" contenteditable="true" onblur="updateHabitName(${habit.id}, this.innerText)">${habit.name}</span>

                        </div>
                    </td>
                    <td><span class="goal-cell editable" contenteditable="true" onblur="updateHabitGoal(${habit.id}, this.innerText)">${habit.goal}</span></td>
                `;

                const freq = habit.frequency || 'Everyday';

                days.forEach(dayDate => {
                    const dateStr = formatDate(dayDate);
                    const dayNum = dayDate.getDay();
                    let shouldShow = true;
                    if (freq === 'Weekdays' && (dayNum === 0 || dayNum === 6)) shouldShow = false;
                    if (freq === 'Weekends' && (dayNum !== 0 && dayNum !== 6)) shouldShow = false;

                    if (!shouldShow) {

                    } else {

                        let timerHtml = '';
                        if (isToday && !isCompleted) {

                        }

                        tdHtml += `
                            <td style="${tdStyle} position: relative;">

                                    <label for="${checkboxId}"></label>

                                <div class="note-indicator" onclick="openNoteModal(${habit.id}, '${dateStr}')" style="opacity: ${hasNote ? 1 : 0.2};" title="Add/Edit Note">📝</div>
                                ${timerHtml}
                            </td>
                        `;
                    }
                });

                tdHtml += `
                    <td>
                        <div class="actions">
                            <button class="btn-icon" onclick="archiveHabit(${habit.id})" title="Archive Habit">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"></polyline><rect x="1" y="3" width="22" height="5"></rect><line x1="10" y1="12" x2="14" y2="12"></line></svg>
                            </button>
                            <button class="btn-icon btn-delete" onclick="deleteHabit(${habit.id})" title="Delete Habit Permanently">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>

                tr.innerHTML = tdHtml;
                tbody.appendChild(tr);

        document.addEventListener('keydown', function(e) {
            if (e.target.classList.contains('editable') && e.key === 'Enter') { e.preventDefault(); e.target.blur(); }
        });

        // --- Timer Logic ---
        let timerInterval;
        let timeLeft = 25 * 60;
        let timerHabitId = null;
        let timerDateStr = null;

        function openTimer(habitId, dateStr) {
            timerHabitId = habitId;
            timerDateStr = dateStr;
            timeLeft = 25 * 60;
            updateTimerDisplay();
            document.getElementById('timerModal').style.display = 'flex';
            document.getElementById('btnStartTimer').style.display = 'block';
            document.getElementById('btnPauseTimer').style.display = 'none';
        }
        function updateTimerDisplay() {
            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('timerDisplay').textContent = `${m}:${s}`;
        }
        function startTimer() {
            document.getElementById('btnStartTimer').style.display = 'none';
            document.getElementById('btnPauseTimer').style.display = 'block';
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    completeTimer();
                }
            }, 1000);
        }
        function pauseTimer() {
            clearInterval(timerInterval);
            document.getElementById('btnStartTimer').style.display = 'block';
            document.getElementById('btnPauseTimer').style.display = 'none';
        }
        function closeTimer() {
            clearInterval(timerInterval);
            document.getElementById('timerModal').style.display = 'none';
        }
        function completeTimer() {
            closeTimer();
            const habit = habits.find(h => h.id === timerHabitId);
            if (habit) {
                habit.completions[timerDateStr] = true;
                saveHabits();
                render();
                if (typeof confetti === 'function') confetti({ particleCount: 250, spread: 120, zIndex: 3500 });
            }
        }

        // --- Leaderboard & Admin API Logic ---
        async function openLeaderboard() {
            document.getElementById('leaderboardModal').style.display = 'flex';
            const container = document.getElementById('leaderboardList');
            container.innerHTML = 'Loading...';
            try {
                const res = await fetch('/api/leaderboard', { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                let html = '';
                data.forEach((u, i) => {
                    const lvl = Math.floor(u.xp / 100) + 1;
                    let medal = '';
                    if(i===0) medal = '🥇'; else if(i===1) medal = '🥈'; else if(i===2) medal = '🥉';
                    html += `
                        <div style="display:flex; justify-content:space-between; padding: 1rem; border-bottom:1px solid var(--border-color);">
                            <span style="font-weight:bold; font-size:1.1rem;">${i+1}. ${medal} ${u.username}</span>
                            <span class="level-badge" style="margin:0;">Level ${lvl} (${u.xp} XP)</span>
                        </div>
                    `;
                });
                container.innerHTML = html;
            } catch(e) { container.innerHTML = 'Failed to load leaderboard'; }
        }

        async function openAdmin() {
            document.getElementById('adminModal').style.display = 'flex';
            const container = document.getElementById('adminList');
            container.innerHTML = 'Loading...';
            try {
                const res = await fetch('/api/admin/users', { headers: { 'Authorization': `Bearer ${token}` } });
                if (!res.ok) throw new Error('Access denied');
                const data = await res.json();
                let html = '<div style="overflow-x: auto;"><table style="width:100%; border-collapse: collapse; font-size: 0.9rem; min-width: 400px;"><tr><th style="text-align:left; padding: 0.5rem;">ID</th><th style="text-align:left; padding: 0.5rem;">Username</th><th style="text-align:left; padding: 0.5rem;">Role</th><th style="text-align:left; padding: 0.5rem;">XP</th><th style="padding: 0.5rem;">Action</th></tr>';
                data.forEach(u => {
                    html += `
                        <tr style="border-bottom: 1px solid var(--border-color);">
                            <td style="padding: 0.5rem; text-align:left;">${u.id}</td>
                            <td style="padding: 0.5rem; text-align:left; font-weight:bold;">${u.username}</td>
                            <td style="padding: 0.5rem; text-align:left;">${u.role}</td>
                            <td style="padding: 0.5rem; text-align:left;">${u.xp}</td>
                            <td style="padding: 0.5rem; text-align:center;"><button class="secondary-btn danger-btn" style="padding:0.3rem 0.6rem; font-size:0.8rem; margin:0;" onclick="adminDeleteUser(${u.id})">Delete</button></td>
                        </tr>
                    `;
                });
                html += '</table></div>';
                container.innerHTML = html;
            } catch(e) { container.innerHTML = e.message; }
        }
        
        async function adminDeleteUser(id) {
            if(!confirm("Delete user permanently? This cannot be undone.")) return;
            try {
                await fetch(`/api/admin/users/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
                openAdmin();
            } catch(e) { alert(e.message); }
        }

        // --- Charting Logic ---
        let chartInstance = null;

        function openChartModal() {
            document.getElementById('chartModal').style.display = 'flex';
            renderChart('daily');
        }

        function renderChart(type) {
            document.getElementById('btnDaily').style.background = type === 'daily' ? 'var(--primary)' : 'transparent';
            document.getElementById('btnDaily').style.color = type === 'daily' ? 'white' : 'var(--text-main)';
            document.getElementById('btnWeekly').style.background = type === 'weekly' ? 'var(--primary)' : 'transparent';
            document.getElementById('btnWeekly').style.color = type === 'weekly' ? 'white' : 'var(--text-main)';
            document.getElementById('btnMonthly').style.background = type === 'monthly' ? 'var(--primary)' : 'transparent';
            document.getElementById('btnMonthly').style.color = type === 'monthly' ? 'white' : 'var(--text-main)';
            document.getElementById('btnHeatmap').style.background = type === 'heatmap' ? 'var(--primary)' : 'transparent';
            document.getElementById('btnHeatmap').style.color = type === 'heatmap' ? 'white' : 'var(--text-main)';

            if (type === 'heatmap') {
                document.getElementById('chartWrapper').style.display = 'none';
                document.getElementById('heatmapContainer').style.display = 'block';
                renderHeatmap();
                return;
            }
            
            document.getElementById('heatmapContainer').style.display = 'none';
            document.getElementById('chartWrapper').style.display = 'block';

            const ctx = document.getElementById('progressChart').getContext('2d');
            if (chartInstance) chartInstance.destroy();

            let labels = [];
            let dataPoints = [];

            if (type === 'daily') {
                for(let i=13; i>=0; i--) {
                    let d = new Date(); d.setDate(d.getDate() - i);
                    const dayNames = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
                    labels.push(`${dayNames[d.getDay()]} ${d.getDate()}`);
                    let completed = 0;
                    habits.forEach(h => { if(h.completions[formatDate(d)]) completed++; });
                    dataPoints.push(completed);
                }
            } else if (type === 'weekly') {
                for(let i=4; i>=0; i--) {
                    let d = new Date(); d.setDate(d.getDate() - (i*7));
                    let day = d.getDay(); let diff = d.getDate() - day + (day == 0 ? -6 : 1);
                    let ws = new Date(d); ws.setDate(diff);
                    labels.push(`Week ${ws.getDate()}/${ws.getMonth()+1}`);
                    let completed = 0;
                    habits.forEach(h => {
                        for(let j=0; j<7; j++) {
                            let curr = new Date(ws); curr.setDate(curr.getDate() + j);
                            if(h.completions[formatDate(curr)]) completed++;
                        }
                    });
                    dataPoints.push(completed);
                }
            } else {
                for(let i=5; i>=0; i--) {
                    let d = new Date(); d.setMonth(d.getMonth() - i);
                    const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
                    labels.push(monthNames[d.getMonth()]);
                    let completed = 0;
                    habits.forEach(h => {
                        Object.keys(h.completions).forEach(dateStr => {
                            let cd = new Date(dateStr);
                            if (cd.getMonth() === d.getMonth() && cd.getFullYear() === d.getFullYear()) completed++;
                        });
                    });
                    dataPoints.push(completed);
                }
            }

            const isDark = document.body.classList.contains('dark-mode');

            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Total Habits Completed', data: dataPoints,
                        backgroundColor: isDark ? 'rgba(129, 140, 248, 0.8)' : 'rgba(102, 126, 234, 0.8)',
                        borderColor: isDark ? '#818cf8' : '#667eea', borderWidth: 1, borderRadius: 6
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: { 
                        y: { beginAtZero: true, ticks: { precision: 0, color: isDark ? '#a0aec0' : '#718096' } },
                        x: { ticks: { color: isDark ? '#a0aec0' : '#718096' } }
                    },
                    plugins: { legend: { labels: { color: isDark ? '#a0aec0' : '#718096' } } }
                }
            });
        }

        function renderHeatmap() {
            const container = document.getElementById('heatmapContainer');
            container.innerHTML = '';
            
            const today = new Date();
            const startDate = new Date();
            startDate.setDate(today.getDate() - 364);
            
            let counts = {};
            habits.forEach(h => {
                Object.keys(h.completions).forEach(d => {
                    if(h.completions[d]) counts[d] = (counts[d] || 0) + 1;
                });
            });

            let html = '<div style="display: flex; gap: 4px; padding-bottom: 0.5rem; justify-content: flex-start;">';
            let currentDate = new Date(startDate);
            
            while(currentDate <= today) {
                html += '<div style="display: flex; flex-direction: column; gap: 4px;">';
                for(let i=0; i<7 && currentDate <= today; i++) {
                    const ds = formatDate(currentDate);
                    const c = counts[ds] || 0;
                    let color = document.body.classList.contains('dark-mode') ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';
                    if (c > 0) color = 'rgba(72, 187, 120, 0.3)';
                    if (c > 2) color = 'rgba(72, 187, 120, 0.6)';
                    if (c > 4) color = 'rgba(72, 187, 120, 1)';
                    
                    html += `<div style="width: 14px; height: 14px; border-radius: 3px; background: ${color};" title="${ds}: ${c} habits"></div>`;
                    currentDate.setDate(currentDate.getDate() + 1);
                }
                html += '</div>';
            }
            html += '</div>';
            container.innerHTML = html;
            // Scroll to end
            setTimeout(() => { container.scrollLeft = container.scrollWidth; }, 10);
        }
    </script>
</body>
